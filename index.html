<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
margin:0;
color:white;
text-align:center;
background:#020617;
overflow-x:hidden;
}

/* خلفية */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.box{
background:#0f172a;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px #00eaff55;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#00eaff;
cursor:pointer;
}

#winner{
font-size:25px;
color:#00ffcc;
}

/* روبوت */
#robot{
position:fixed;
bottom:20px;
left:20px;
font-size:50px;
}

/* قصاصات */
.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear;
}

@keyframes fall{
to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<!-- فيديو خلفية -->
<video id="bgVideo" autoplay muted loop></video>

<h1>🤖 منصة بصمة الذكاء</h1>

<button onclick="startSound()">🔊 تشغيل الصوت</button>

<!-- رفع خلفية -->
<div class="box">
<h3>🎬 الخلفية</h3>
<input type="file" accept="video/*" onchange="setBG(event)">
</div>

<!-- البيانات -->
<div class="box">
<h3>البيانات الأساسية</h3>
<input placeholder="اسم المدرسة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<!-- الفصول -->
<div class="box">
<h3>الفصول</h3>
<input id="classInput">
<button onclick="addClass()">إضافة</button>
<div id="classes"></div>
</div>

<!-- المجموعات -->
<div class="box">
<h3>المجموعات</h3>
<input id="groupInput">
<button onclick="addGroup()">إضافة</button>
<div id="groups"></div>
</div>

<!-- السؤال -->
<div class="box">
<h3>السؤال</h3>
<input id="q"><br>

<input id="a1">
<input id="a2">
<input id="a3">
<input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>
<div id="answers"></div>
</div>

<button onclick="showWinner()">🏆 إعلان الفائز</button>
<div id="winner"></div>

<div id="robot">🤖</div>

<audio id="clap" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>

/* الخلفية */
let savedBG = localStorage.getItem("bgVideo");
if(savedBG){
bgVideo.src = savedBG;
}

function setBG(e){
let file = e.target.files[0];
if(!file) return;
let url = URL.createObjectURL(file);
bgVideo.src = url;
localStorage.setItem("bgVideo", url);
}

/* بيانات */
let classesData = JSON.parse(localStorage.getItem("classes")) || [];
let groupsData = JSON.parse(localStorage.getItem("groups")) || [];
let currentClass = localStorage.getItem("currentClass") || "";

/* حفظ */
function save(){
localStorage.setItem("classes",JSON.stringify(classesData));
localStorage.setItem("groups",JSON.stringify(groupsData));
localStorage.setItem("currentClass",currentClass);
render();
}

/* عرض */
function render(){

let cDiv = document.getElementById("classes");
cDiv.innerHTML="";

classesData.forEach((c,i)=>{
let d=document.createElement("div");
d.innerHTML=(c===currentClass?"👉 ":"")+c+" ❌";

d.onclick=()=>{currentClass=c;save();}
d.ondblclick=()=>{
classesData.splice(i,1);
groupsData=groupsData.filter(g=>g.class!==c);
save();
};

cDiv.appendChild(d);
});

let gDiv = document.getElementById("groups");
gDiv.innerHTML="";

groupsData.filter(g=>g.class===currentClass).forEach((g,i)=>{

let d=document.createElement("div");
d.innerHTML=g.name+" ⭐ "+g.score+" ❌";

d.onclick=()=>{
groupsData.splice(groupsData.indexOf(g),1);
save();
};

d.ondblclick=()=>{
g.score++;
save();
};

gDiv.appendChild(d);
});
}

/* إضافة */
function addClass(){
let v=classInput.value;
if(!v)return;
classesData.push(v);
if(!currentClass)currentClass=v;
save();
}

function addGroup(){
if(!currentClass){alert("اختاري فصل");return;}
let v=groupInput.value;
if(!v)return;
groupsData.push({name:v,score:0,class:currentClass});
save();
}

/* السؤال */
function showQ(){
answers.innerHTML="";
let correctIndex=correct.value;

[a1.value,a2.value,a3.value,a4.value].forEach((a,i)=>{
let b=document.createElement("button");
b.innerText=a;

b.onclick=()=>{
if(i==correctIndex){
b.style.background="green";
}else{
b.style.background="red";
}
};

answers.appendChild(b);
});
}

/* صوت */
function startSound(){
let msg=new SpeechSynthesisUtterance("مرحباً بكم في منصة بصمة الذكاء");
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

/* الفائز */
function showWinner(){
let gs=groupsData.filter(g=>g.class===currentClass);
if(gs.length===0)return;

let win=gs.reduce((a,b)=>a.score>b.score?a:b);

winner.innerHTML="🏆 "+win.name;

clap.play();

let msg=new SpeechSynthesisUtterance("الفريق الفائز هو "+win.name);
speechSynthesis.speak(msg);

/* قصاصات */
for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background="hsl("+Math.random()*360+",100%,50%)";
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

render();

</script>

</body>
</html>
