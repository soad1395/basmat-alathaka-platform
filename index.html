 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🤖 بصمة الذكاء</title>

<style>
body{
margin:0;
font-family:tahoma;
color:white;
text-align:center;
overflow-y:auto;
}

/* فيديو */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* صندوق */
.box{
background:rgba(0,0,0,0.6);
margin:15px;
padding:15px;
border-radius:15px;
}

/* زر */
button{
padding:10px;
border:none;
border-radius:10px;
background:#00eaff;
margin:5px;
cursor:pointer;
}

/* دوائر */
.circle{
width:110px;
height:110px;
border-radius:50%;
background:#888;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
}

.correct{background:#2ecc71;}
.wrong{background:#e74c3c;}

#robot{
position:fixed;
bottom:10px;
left:10px;
font-size:40px;
}

#win{
font-size:30px;
display:none;
}
</style>
</head>

<body onload="start()">

<video id="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h1>🤖 منصة بصمة الذكاء</h1>
<div id="robot">🤖✨</div>

<div class="box">
<input type="file" accept="video/*" onchange="setVideo(event)">
</div>

<div class="box">
<h2>البيانات</h2>
<input placeholder="المعلمة">
<input placeholder="المدرسة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<div class="box">
<h2>الفصول</h2>
<input id="classInput">
<button onclick="addClass()">إضافة</button>
<div id="classList"></div>
</div>

<div class="box">
<h2>المجموعات</h2>
<input id="groupInput">
<button onclick="addGroup()">إضافة</button><br><br>

<select id="groupSelect"></select>

<div id="groups"></div>

<h3 id="selectedGroup">لم يتم الاختيار</h3>
<button onclick="spinWheel()">🎡 تدوير العجلة</button>

</div>

<div class="box">
<h2>السؤال</h2>
<input id="q"><br>
<input id="a1"><input id="a2"><br>
<input id="a3"><input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>

<div id="qBox"></div>
</div>

<button onclick="winner()">🏆 إعلان الفائز</button>
<div id="win"></div>

<script>
let data = JSON.parse(localStorage.getItem("AI")) || {};
let currentClass="";

/* صوت */
function speak(t){
let msg=new SpeechSynthesisUtterance(t);
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

/* تصفيق */
function clap(){
new Audio("https://www.soundjay.com/human/applause-8.mp3").play();
}

/* بداية */
function start(){
setTimeout(()=>{
speak("مرحباً بكم في منصة بصمة الذكاء");
},500);
renderClasses();
}

/* فيديو */
function setVideo(e){
bg.src=URL.createObjectURL(e.target.files[0]);
}

/* فصول */
function addClass(){
let c=classInput.value;
if(!c) return;
if(!data[c]) data[c]={};
currentClass=c;
save();
renderClasses();
renderGroups();
}

function renderClasses(){
classList.innerHTML="";
for(let c in data){
classList.innerHTML+=`
<div>${c}
<button onclick="selectClass('${c}')">اختيار</button>
<button onclick="deleteClass('${c}')">❌</button>
</div>`;
}
}

function selectClass(c){
currentClass=c;
renderGroups();
}

function deleteClass(c){
delete data[c];
save();
renderClasses();
renderGroups();
}

/* مجموعات */
function addGroup(){
let g=groupInput.value;
if(!currentClass) return alert("اختاري فصل");
if(!g) return;

data[currentClass][g]=data[currentClass][g]||0;

save();
renderGroups();
}

function renderGroups(){
groups.innerHTML="";
groupSelect.innerHTML="";

if(!currentClass) return;

for(let g in data[currentClass]){
groups.innerHTML+=`
${g} ⭐ ${data[currentClass][g]}
<button onclick="deleteGroup('${g}')">❌</button><br>`;
groupSelect.innerHTML+=`<option>${g}</option>`;
}
}

function deleteGroup(g){
delete data[currentClass][g];
save();
renderGroups();
}

/* عجلة */
function spinWheel(){
let arr=Object.keys(data[currentClass]);
if(arr.length==0) return;

let i=0;
let inter=setInterval(()=>{
selectedGroup.innerText=arr[i%arr.length];
i++;
},100);

setTimeout(()=>{
clearInterval(inter);
let chosen=arr[Math.floor(Math.random()*arr.length)];
selectedGroup.innerText="🎯 "+chosen;
groupSelect.value=chosen;
speak("المجموعة المختارة "+chosen);
},2000);
}

/* سؤال */
function showQ(){
let answers=[a1.value,a2.value,a3.value,a4.value];

qBox.innerHTML="<h3>"+q.value+"</h3>";

answers.forEach((ans,i)=>{
qBox.innerHTML+=`
<div class="circle" onclick="checkAnswer(${i})">${ans}</div>`;
});
}

/* إصلاح الإجابة */
function checkAnswer(i){

let circles=document.querySelectorAll(".circle");
let g=groupSelect.value;
let c=parseInt(document.getElementById("correct").value);

if(!g){
alert("اختاري مجموعة");
return;
}

circles.forEach(el=>{
el.classList.remove("correct","wrong");
});

if(i === c){
circles[i].classList.add("correct");
data[currentClass][g]++;
speak("إجابة صحيحة");
clap();
confetti();
}else{
circles[i].classList.add("wrong");
speak("خطأ");
}

save();
renderGroups();
}

/* فائز */
function winner(){
let max=-1,name="";
for(let g in data[currentClass]){
if(data[currentClass][g]>max){
max=data[currentClass][g];
name=g;
}
}

win.innerHTML="🏆 "+name+" 🎉👏";
win.style.display="block";
clap();
confetti();
speak("الفائز هو "+name);
}

/* قصاصات */
function confetti(){
for(let i=0;i<40;i++){
let d=document.createElement("div");
d.style.position="fixed";
d.style.width="8px";
d.style.height="8px";
d.style.background=`hsl(${Math.random()*360},100%,50%)`;
d.style.top="0";
d.style.left=Math.random()*100+"%";
document.body.appendChild(d);

let fall=setInterval(()=>{
d.style.top=(d.offsetTop+5)+"px";
},20);

setTimeout(()=>{
clearInterval(fall);
d.remove();
},2000);
}
}

/* حفظ */
function save(){
localStorage.setItem("AI",JSON.stringify(data));
}
</script>

</body>
</html>
