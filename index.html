 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
margin:0;
color:white;
text-align:center;
overflow:hidden;
}

/* فيديو الخلفية */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* الصناديق */
.box{
background:#0f172acc;
margin:20px;
padding:20px;
border-radius:20px;
}

/* الأزرار */
button{
padding:10px 15px;
margin:5px;
background:#00eaff;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- فيديو -->
<video id="bgVideo" autoplay muted loop></video>

<h1>🤖 منصة بصمة الذكاء</h1>

<!-- صوت + رفع فيديو -->
<button onclick="playSound()">🔊 تشغيل الصوت</button>
<input type="file" accept="video/*" onchange="changeBg(event)">

<!-- الفصول -->
<div class="box">
<h2>الفصول</h2>
<input id="inputClass" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة</button>
<div id="classes"></div>
</div>

<!-- المجموعات -->
<div class="box">
<h2>المجموعات</h2>
<input id="inputGroup" placeholder="اسم المجموعة">
<button onclick="addGroup()">إضافة</button>
<div id="groups"></div>
</div>

<!-- الفائز -->
<button onclick="showWinner()">🏆 إعلان الفائز</button>

<script>

/* البيانات */
let classesData = {};
let currentClass = "";

/* إضافة فصل */
function addClass(){
let name = document.getElementById("inputClass").value;

let div = document.createElement("div");
div.innerHTML = `
<button onclick="selectClass('${name}')">${name}</button>
`;

document.getElementById("classes").appendChild(div);

if(!classesData[name]){
classesData[name] = [];
}
}

/* اختيار فصل */
function selectClass(name){
currentClass = name;
renderGroups();
}

/* إضافة مجموعة */
function addGroup(){
let name = document.getElementById("inputGroup").value;

if(!currentClass){
alert("اختاري فصل أول");
return;
}

classesData[currentClass].push({
name:name,
points:0
});

renderGroups();
}

/* عرض المجموعات */
function renderGroups(){
let container = document.getElementById("groups");
container.innerHTML = "";

let groups = classesData[currentClass] || [];

groups.forEach((g,index)=>{
let div = document.createElement("div");

div.innerHTML = `
${g.name} ⭐ ${g.points}
<button onclick="addPoint(${index})">+1</button>
<button onclick="removeGroup(${index})">❌</button>
`;

container.appendChild(div);
});
}

/* زيادة النقاط */
function addPoint(index){
classesData[currentClass][index].points++;
playSound();
renderGroups();
}

/* حذف مجموعة */
function removeGroup(index){
classesData[currentClass].splice(index,1);
renderGroups();
}

/* إعلان الفائز */
function showWinner(){
let groups = classesData[currentClass] || [];

if(groups.length === 0){
alert("لا يوجد مجموعات");
return;
}

let max = Math.max(...groups.map(g=>g.points));

if(max === 0){
alert("لا يوجد فائز");
return;
}

let winners = groups.filter(g=>g.points === max);

clapSound();

alert("🏆 الفائز: " + winners.map(w=>w.name).join(" و "));
}

/* صوت عادي */
function playSound(){
let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
audio.play();
}

/* صوت تصفيق */
function clapSound(){
let audio = new Audio("https://www.soundjay.com/human/sounds/applause-8.mp3");
audio.play();
}

/* تغيير الخلفية */
function changeBg(e){
let file = e.target.files[0];
let url = URL.createObjectURL(file);
document.getElementById("bgVideo").src = url;
}

</script>

</body>
</html>
