 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالم بصمة الذكاء</title>

<style>

body{
direction:rtl;
font-family:Tahoma;
margin:0;
text-align:center;
color:white;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* خلفية الذكاء */

.ai{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 40%,#00e5ff22,transparent),
radial-gradient(circle at 70% 60%,#00e5ff22,transparent);
animation:move 8s infinite alternate;
z-index:-1;
}

@keyframes move{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(120deg)}
}

header{
font-size:32px;
padding:20px;
text-shadow:0 0 20px #00e5ff;
}

.box{
background:#021c2d;
margin:20px auto;
width:90%;
max-width:900px;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px #00e5ff44;
}

/* أزرار الإجابة */

.choice{
width:120px;
height:120px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
font-size:18px;
margin:15px;
cursor:pointer;
transition:.3s;
}

.choice:hover{
transform:scale(1.2);
}

.a{background:#ffc107}
.b{background:#00c853}
.c{background:#ff1744}
.d{background:#2979ff}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00e5ff;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #00e5ff;
padding:8px;
}

</style>
</head>

<body>

<div class="ai"></div>

<header>🧠 عالم بصمة الذكاء</header>

<audio autoplay>
<source src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3">
</audio>

<div class="box">

<h3>إضافة مجموعة</h3>

<input id="teamName" placeholder="اسم المجموعة">
<button onclick="addTeam()">إضافة</button>

<table>

<tr>
<th>المجموعة</th>
<th>النقاط</th>
<th>حذف</th>
</tr>

<tbody id="teams"></tbody>

</table>

</div>

<div class="box">

<h2 id="question"></h2>

<div>

<div class="choice a" onclick="answer(0)"></div>
<div class="choice b" onclick="answer(1)"></div>
<div class="choice c" onclick="answer(2)"></div>
<div class="choice d" onclick="answer(3)"></div>

</div>

<p id="result"></p>

</div>

<script>

let questions=[
{
q:"كيف تكون شمولية العبادة؟",
options:[
"بالصلاة فقط",
"تشمل كل جوانب الحياة",
"بالدعاء فقط",
"بالصوم فقط"
],
correct:1
}
]

let teams=[]

let correctSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3")
let wrongSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3")

function showQuestion(){

let q=questions[0]

document.getElementById("question").innerText=q.q

let btn=document.querySelectorAll(".choice")

btn.forEach((b,i)=>{
b.innerText=q.options[i]
})

}

function answer(i){

let q=questions[0]

if(i==q.correct){

document.getElementById("result").innerText="⭐ إجابة صحيحة"
correctSound.play()

teams.forEach(t=>t.points++)

renderTeams()

}
else{

document.getElementById("result").innerText="💡 حاولي مرة أخرى"
wrongSound.play()

}

}

function addTeam(){

let name=document.getElementById("teamName").value

if(!name) return

teams.push({name:name,points:0})

document.getElementById("teamName").value=""

renderTeams()

}

function renderTeams(){

let table=document.getElementById("teams")

table.innerHTML=""

teams.forEach((t,i)=>{

table.innerHTML+=`
<tr>
<td>${t.name}</td>
<td>${t.points}</td>
<td><button onclick="deleteTeam(${i})">❌</button></td>
</tr>
`

})

}

function deleteTeam(i){

teams.splice(i,1)

renderTeams()

}

showQuestion()

</script>

</body>
</html>
