  <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🤖 بصمة الذكاء</title>

<style>
body{margin:0;font-family:tahoma;color:white;text-align:center}

#bg{
position:fixed;
width:100%;height:100%;
object-fit:cover;
z-index:-1;
}

.box{
background:rgba(0,0,0,.6);
margin:10px;
padding:10px;
border-radius:10px;
}

button{
padding:8px;
margin:5px;
border:none;
border-radius:8px;
background:#00eaff;
cursor:pointer;
}

.circle{
width:100px;height:100px;
border-radius:50%;
background:#777;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
}

.correct{background:#2ecc71}
.wrong{background:#e74c3c}

#robot{
position:fixed;
bottom:10px;
left:10px;
font-size:40px;
}
</style>
</head>

<body onclick="startAI()">

<video id="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h2>🤖 بصمة الذكاء</h2>
<div id="robot">🤖</div>

<!-- رفع فيديو -->
<div class="box">
<input type="file" accept="video/*" onchange="bg.src=URL.createObjectURL(event.target.files[0])">
</div>

<!-- البيانات -->
<div class="box">
<input placeholder="المعلمة">
<input placeholder="المدرسة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<!-- الفصول -->
<div class="box">
<input id="classInput" placeholder="فصل">
<button onclick="addClass()">إضافة</button>
<div id="classList"></div>
</div>

<!-- المجموعات -->
<div class="box">
<input id="groupInput" placeholder="مجموعة">
<button onclick="addGroup()">إضافة</button>

<select id="groupSelect"></select>
<div id="groups"></div>

<button onclick="spin()">🎡 عجلة</button>
<h3 id="selected"></h3>

<button onclick="addPoint()">➕ نقطة</button>
</div>

<!-- السؤال -->
<div class="box">
<input id="q" placeholder="السؤال"><br>

<input id="a1"><input id="a2"><br>
<input id="a3"><input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>
<div id="qBox"></div>
</div>

<button onclick="winner()">🏆 إعلان الفائز</button>
<h2 id="win"></h2>

<script>

let data={},currentClass="";
let started=false;

/* صوت */
function speak(t){
speechSynthesis.cancel();
let m=new SpeechSynthesisUtterance(t);
m.lang="ar-SA";
speechSynthesis.speak(m);
}

/* دخول */
function startAI(){
if(!started){
speak("مرحباً بكم في عالم الذكاء الاصطناعي");
started=true;
}
}

/* فصول */
function addClass(){
let c=classInput.value;
if(!c)return;
data[c]={};
currentClass=c;
renderClasses();
renderGroups();
}

function renderClasses(){
classList.innerHTML="";
for(let c in data){
classList.innerHTML+=`
<div>${c}
<button onclick="selectClass('${c}')">اختيار</button>
<button onclick="delete data['${c}'];renderClasses()">❌</button>
</div>`;
}
}

function selectClass(c){
currentClass=c;
renderGroups();
}

/* مجموعات */
function addGroup(){
let g=groupInput.value;
if(!currentClass)return alert("اختاري فصل");
data[currentClass][g]=data[currentClass][g]||0;
renderGroups();
}

function renderGroups(){
groups.innerHTML="";
groupSelect.innerHTML="";
for(let g in data[currentClass]||{}){
groups.innerHTML+=`${g} ⭐ ${data[currentClass][g]}<br>`;
groupSelect.innerHTML+=`<option>${g}</option>`;
}
}

/* نقطة يدوي */
function addPoint(){
let g=groupSelect.value;
data[currentClass][g]++;
renderGroups();
}

/* عجلة */
function spin(){
let arr=Object.keys(data[currentClass]||{});
let g=arr[Math.floor(Math.random()*arr.length)];
selected.innerText="🎯 "+g;
groupSelect.value=g;
speak("المجموعة "+g);
}

/* سؤال */
function showQ(){
let answers=[a1.value,a2.value,a3.value,a4.value];
qBox.innerHTML="<h3>"+q.value+"</h3>";

answers.forEach((a,i)=>{
qBox.innerHTML+=`<div class="circle" data-i="${i}" onclick="check(this)">${a}</div>`;
});

speak(q.value);
}

/* إجابة */
function check(el){
let c=parseInt(correct.value);
let i=parseInt(el.dataset.i);

document.querySelectorAll(".circle").forEach(e=>{
e.classList.remove("correct","wrong");
});

if(i===c){
el.classList.add("correct");
data[currentClass][groupSelect.value]++;
speak("إجابة صحيحة");
new Audio("https://www.soundjay.com/human/applause-8.mp3").play();
confetti();
}else{
el.classList.add("wrong");
speak("خطأ");
}
renderGroups();
}

/* فائز */
function winner(){
let max=-1,name="";
for(let g in data[currentClass]){
if(data[currentClass][g]>max){
max=data[currentClass][g];
name=g;
}
}
win.innerText="🏆 "+name;
confetti();
speak("الفائز "+name);
}

/* قصاصات */
function confetti(){
for(let i=0;i<30;i++){
let d=document.createElement("div");
d.style.position="fixed";
d.style.width="6px";
d.style.height="6px";
d.style.background="yellow";
d.style.top="0";
d.style.left=Math.random()*100+"%";
document.body.appendChild(d);
let fall=setInterval(()=>d.style.top=(d.offsetTop+5)+"px",20);
setTimeout(()=>{clearInterval(fall);d.remove()},2000);
}
}

</script>

</body>
