 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
margin:0;
color:white;
text-align:center;
overflow:hidden;
}

/* فيديو */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* تصميم */
.box{
background:#0f172acc;
margin:15px;
padding:20px;
border-radius:20px;
}

button{
background:#22d3ee;
border:none;
padding:10px 15px;
border-radius:10px;
margin:5px;
cursor:pointer;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

/* الدوائر */
.circle{
width:110px;
height:110px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
background:#ef4444;
cursor:pointer;
}

.correct{background:#22c55e;}
.wrong{background:#ef4444;}

/* روبوت */
#robot{
position:fixed;
bottom:15px;
left:15px;
font-size:35px;
animation:move 2s infinite alternate;
}
@keyframes move{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

/* احتفال */
#celebration{
display:none;
position:fixed;
top:30%;
left:0;
right:0;
background:#000000cc;
padding:20px;
border-radius:20px;
font-size:25px;
}
</style>
</head>

<body>

<!-- فيديو -->
<video id="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h1>🤖 منصة بصمة الذكاء</h1>

<label style="background:#22d3ee;padding:10px;border-radius:10px;cursor:pointer;">
🎬 تغيير الخلفية
<input type="file" accept="video/*" hidden onchange="setVideo(event)">
</label>

<button onclick="speak('أهلاً بكم')">🔊 تشغيل الصوت</button>

<!-- البيانات -->
<div class="box">
<h2>البيانات</h2>
<input placeholder="اسم المعلمة">
<input placeholder="اسم المدرسة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<!-- الفصول -->
<div class="box">
<h2>الفصول</h2>
<input id="className" placeholder="اسم الفصل">
<button onclick="addClass()">إضافة</button>

<div id="classList"></div>
</div>

<!-- المجموعات -->
<div class="box">
<h2>المجموعات</h2>
<input id="groupName" placeholder="اسم المجموعة">
<button onclick="addGroup()">إضافة</button>

<br>
<select id="activeGroup"></select>

<div id="groups"></div>
</div>

<!-- السؤال -->
<div class="box">
<h2>🎮 السؤال</h2>

<input id="question" placeholder="السؤال"><br>

<input id="a1" placeholder="1">
<input id="a2" placeholder="2"><br>
<input id="a3" placeholder="3">
<input id="a4" placeholder="4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<br>
<button onclick="showQ()">عرض السؤال</button>

<div id="qBox"></div>
</div>

<button onclick="winner()">🏆 إعلان الفائز</button>
<h2 id="result"></h2>

<div id="celebration">
🏆🎉🎉🎉  
<h2 id="winnerName"></h2>
🎉🎉🎉
</div>

<div id="robot">🤖✨</div>

<script>

let data = JSON.parse(localStorage.getItem("AI")) || {};
let currentClass = "";

/* حفظ */
function save(){
localStorage.setItem("AI", JSON.stringify(data));
}

/* فيديو */
function setVideo(e){
bg.src = URL.createObjectURL(e.target.files[0]);
}

/* صوت */
function speak(text){
let msg = new SpeechSynthesisUtterance(text);
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

/* فصول */
function addClass(){
let c = className.value;
if(!data[c]) data[c]={};

currentClass = c;
save();
showClasses();
show();
}

function showClasses(){
classList.innerHTML="";

for(let c in data){
classList.innerHTML += `
<div class="box">
${c}
<button onclick="selectClass('${c}')">اختيار</button>
<button onclick="deleteClass('${c}')">❌</button>
</div>
`;
}
}

function selectClass(c){
currentClass = c;
show();
}

function deleteClass(c){
delete data[c];
save();
showClasses();
}

/* مجموعات */
function addGroup(){
let g = groupName.value;

for(let c in data){
data[c][g] = data[c][g] || 0;
}

save();
show();
}

/* عرض */
function show(){
groups.innerHTML="";
activeGroup.innerHTML="<option>اختر المجموعة</option>";

for(let g in data[currentClass]){
groups.innerHTML += `
<div class="box">
${g} ⭐ ${data[currentClass][g]}
<button onclick="addPoint('${g}')">+1</button>
</div>
`;

activeGroup.innerHTML += `<option value="${g}">${g}</option>`;
}
}

/* نقاط */
function addPoint(g){
data[currentClass][g]++;
save();
show();
speak("أحسنت");
}

/* سؤال */
function showQ(){

if(!a1.value||!a2.value||!a3.value||!a4.value){
alert("اكتب الإجابات");
return;
}

let arr=[a1.value,a2.value,a3.value,a4.value];
let c=correct.value;

qBox.innerHTML=`<h3>${question.value}</h3>`;

arr.forEach((ans,i)=>{
qBox.innerHTML+=`
<div class="circle" onclick="check(${i},${c})">${ans}</div>
`;
});
}

/* تحقق */
function check(i,c){

let circles=document.querySelectorAll(".circle");
circles.forEach(el=>el.classList.remove("correct","wrong"));

if(i==c){
circles[i].classList.add("correct");

let g=activeGroup.value;

if(!g){alert("اختاري مجموعة");return;}

data[currentClass][g]++;
save();
show();

speak("إجابة صحيحة");

}else{
circles[i].classList.add("wrong");
}
}

/* فائز */
function winner(){
let max=-1,win="";

for(let g in data[currentClass]){
if(data[currentClass][g]>max){
max=data[currentClass][g];
win=g;
}
}

result.innerHTML="🏆 "+win;

celebration.style.display="block";
winnerName.innerText=win;

speak("الفائز هو "+win);
}

showClasses();

</script>

</body>
</html>
