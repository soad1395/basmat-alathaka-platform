 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
margin:0;
background:#020617;
color:white;
text-align:center;
}

/* خلفية */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00eaff33 2px,transparent 2px);
background-size:80px 80px;
animation:move 40s linear infinite;
z-index:-1;
}
@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(200px,200px)}
}

.box{
background:#0f172a;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px #00eaff55;
}

input,select{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#00eaff;
cursor:pointer;
}

.circle{
width:80px;
height:80px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
background:#1e293b;
cursor:pointer;
}

.correct{background:green;}
.wrong{background:red;}
</style>
</head>

<body>

<h1>🤖 منصة بصمة الذكاء</h1>

<div class="box">
<h2>البيانات الأساسية</h2>
<input placeholder="اسم المدرسة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<div class="box">
<h2>الفصول</h2>
<input id="className">
<button onclick="addClass()">إضافة</button>
<div id="classes"></div>
</div>

<div class="box">
<h2>المجموعات</h2>
<input id="groupName">
<select id="groupClass"></select>
<button onclick="addGroup()">إضافة</button>
<div id="groups"></div>
</div>

<div class="box">
<h2>السؤال</h2>
<input id="q"><br>
<input id="a1">
<input id="a2">
<input id="a3">
<input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>

<div id="answers"></div>
</div>

<button onclick="winner()">🏆 إعلان الفائز</button>

<script>
let classes=[];
let groups=[];
let scores={};
let correctAnswer=0;

function addClass(){
let name=document.getElementById("className").value;
if(!name) return;
classes.push(name);
updateClasses();
}

function updateClasses(){
let div=document.getElementById("classes");
let select=document.getElementById("groupClass");
div.innerHTML="";
select.innerHTML="";
classes.forEach(c=>{
div.innerHTML+=`<p>${c}</p>`;
select.innerHTML+=`<option>${c}</option>`;
});
}

function addGroup(){
let name=document.getElementById("groupName").value;
let cls=document.getElementById("groupClass").value;
if(!name) return;
groups.push({name,cls});
scores[name]=0;
updateGroups();
}

function updateGroups(){
let div=document.getElementById("groups");
div.innerHTML="";
groups.forEach(g=>{
div.innerHTML+=`<p>${g.name} (${g.cls}) = ${scores[g.name]}</p>`;
});
}

function showQ(){
correctAnswer=parseInt(document.getElementById("correct").value);

let arr=[
document.getElementById("a1").value,
document.getElementById("a2").value,
document.getElementById("a3").value,
document.getElementById("a4").value
];

let div=document.getElementById("answers");
div.innerHTML="";

arr.forEach((a,i)=>{
div.innerHTML+=`<div class="circle" onclick="check(${i},this)">${a}</div>`;
});
}

function check(i,el){
document.querySelectorAll(".circle").forEach(c=>{
c.classList.remove("correct","wrong");
});

if(i===correctAnswer){
el.classList.add("correct");
}else{
el.classList.add("wrong");
}
}

function winner(){
let max=0;
let win="";
for(let g in scores){
if(scores[g]>max){
max=scores[g];
win=g;
}
}
alert("🏆 الفريق الفائز: "+win);
}
</script>

</body>
</html>
