 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🤖 بصمة الذكاء</title>

<style>
body{
margin:0;
font-family:tahoma;
color:white;
text-align:center;
overflow-y:auto;
}

/* فيديو كامل */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* صندوق */
.box{
background:rgba(0,0,0,0.6);
margin:15px;
padding:15px;
border-radius:15px;
}

/* زر */
button{
padding:10px;
border:none;
border-radius:10px;
background:#00eaff;
margin:5px;
cursor:pointer;
}

/* دوائر */
.circle{
width:110px;
height:110px;
border-radius:50%;
background:#ff3b3b;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
font-size:18px;
}

.correct{background:#2ecc71;}
.wrong{background:#ff3b3b;}

/* روبوت */
#robot{
position:fixed;
bottom:10px;
left:10px;
font-size:40px;
animation:up 2s infinite alternate;
}
@keyframes up{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

#win{
font-size:30px;
display:none;
}
</style>
</head>

<body onload="start()">

<video id="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h1>🤖 منصة بصمة الذكاء</h1>

<div id="robot">🤖✨</div>

<!-- فيديو -->
<div class="box">
<input type="file" accept="video/*" onchange="setVideo(event)">
</div>

<!-- بيانات -->
<div class="box">
<h2>البيانات</h2>
<input id="t" placeholder="المعلمة">
<input id="s" placeholder="المدرسة">
<input id="m" placeholder="المادة">
<input id="g" placeholder="الصف">
</div>

<!-- الفصول -->
<div class="box">
<h2>الفصول</h2>
<input id="classInput">
<button onclick="addClass()">إضافة</button>
<div id="classList"></div>
</div>

<!-- المجموعات -->
<div class="box">
<h2>المجموعات</h2>
<input id="groupInput">
<button onclick="addGroup()">إضافة</button><br><br>

<select id="groupSelect"></select>

<div id="groups"></div>
</div>

<!-- السؤال -->
<div class="box">
<h2>السؤال</h2>
<input id="q" placeholder="السؤال"><br>
<input id="a1"><input id="a2"><br>
<input id="a3"><input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>

<div id="qBox"></div>
</div>

<button onclick="winner()">🏆 إعلان الفائز</button>
<div id="win"></div>

<script>
let data = JSON.parse(localStorage.getItem("AI")) || {};
let currentClass="";

/* صوت */
function speak(t){
let msg=new SpeechSynthesisUtterance(t);
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

/* بداية */
function start(){
speak("أهلاً بكم");
renderClasses();
}

/* فيديو */
function setVideo(e){
bg.src=URL.createObjectURL(e.target.files[0]);
}

/* فصول */
function addClass(){
let c=classInput.value;
if(!c) return;
if(!data[c]) data[c]={};
currentClass=c;
save();
renderClasses();
renderGroups();
}

/* عرض الفصول */
function renderClasses(){
classList.innerHTML="";
for(let c in data){
classList.innerHTML+=`
<div>
${c}
<button onclick="selectClass('${c}')">اختيار</button>
</div>`;
}
}

/* اختيار فصل */
function selectClass(c){
currentClass=c;
renderGroups();
}

/* مجموعات */
function addGroup(){
let g=groupInput.value;
if(!currentClass) return alert("اختاري فصل");
if(!g) return;

if(!data[currentClass][g]){
data[currentClass][g]=0;
}

save();
renderGroups();
}

/* عرض مجموعات */
function renderGroups(){
groups.innerHTML="";
groupSelect.innerHTML="";

if(!currentClass) return;

for(let g in data[currentClass]){
groups.innerHTML+=`
<div>${g} ⭐ ${data[currentClass][g]}</div>`;

groupSelect.innerHTML+=`<option>${g}</option>`;
}
}

/* سؤال */
function showQ(){
let answers=[a1.value,a2.value,a3.value,a4.value];
let c=correct.value;

qBox.innerHTML="<h3>"+q.value+"</h3>";

answers.forEach((ans,i)=>{
qBox.innerHTML+=`
<div class="circle" onclick="checkAnswer(${i},${c})">${ans}</div>`;
});

speak(q.value);
}

/* تحقق */
function checkAnswer(i,c){
let circles=document.querySelectorAll(".circle");
let group=groupSelect.value;

if(!group) return alert("اختاري مجموعة");

if(i==c){
circles[i].classList.add("correct");
data[currentClass][group]++;
speak("إجابة صحيحة");
}else{
circles[i].classList.add("wrong");
speak("خطأ");
}

save();
renderGroups();
}

/* فائز */
function winner(){
let max=-1;
let name="";

for(let g in data[currentClass]){
if(data[currentClass][g]>max){
max=data[currentClass][g];
name=g;
}
}

win.innerHTML="🏆 "+name+" 🎉👏";
win.style.display="block";
speak("الفائز هو "+name);
}

/* حفظ */
function save(){
localStorage.setItem("AI",JSON.stringify(data));
}
</script>

</body>
</html>
