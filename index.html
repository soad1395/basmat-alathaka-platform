 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بصمة الذكاء</title>

<style>
body{
margin:0;
font-family:tahoma;
text-align:center;
color:white;
}

/* فيديو كامل الشاشة */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* صناديق */
.box{
background:rgba(0,0,0,0.6);
margin:10px;
padding:10px;
border-radius:10px;
}

button{
padding:8px;
margin:5px;
border:none;
border-radius:8px;
background:#00eaff;
cursor:pointer;
}

</style>
</head>

<body>

<!-- الفيديو -->
<video id="bg" autoplay muted loop playsinline>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h2>🤖 منصة بصمة الذكاء</h2>

<!-- البيانات -->
<div class="box">
<input placeholder="المعلمة">
<input placeholder="المدرسة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<!-- الفصول -->
<div class="box">
<input placeholder="فصل">
<button>إضافة</button>
</div>

<!-- المجموعات -->
<div class="box">
<input placeholder="مجموعة">
<button>إضافة</button>
<button>🎡 عجلة</button>
<button>➕ نقطة</button>
</div>

<!-- السؤال -->
<div class="box">
<input placeholder="السؤال"><br>
<input placeholder="1">
<input placeholder="2"><br>
<input placeholder="3">
<input placeholder="4"><br>
<button>عرض</button>
</div>

</body>
</html>
