<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
margin:0;
color:white;
text-align:center;
background:#020617;
}

.box{
background:#0f172a;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px #00eaff55;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#00eaff;
cursor:pointer;
}

#winner{
font-size:25px;
color:#00ffcc;
}
</style>
</head>

<body>

<h1>🤖 منصة بصمة الذكاء</h1>

<button onclick="startSound()">🔊 تشغيل الصوت</button>

<!-- البيانات -->
<div class="box">
<h3>البيانات الأساسية</h3>
<input placeholder="اسم المدرسة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<!-- الفصول -->
<div class="box">
<h3>الفصول</h3>
<input id="classInput">
<button onclick="addClass()">إضافة</button>
<div id="classes"></div>
</div>

<!-- المجموعات -->
<div class="box">
<h3>المجموعات</h3>
<input id="groupInput">
<button onclick="addGroup()">إضافة</button>
<div id="groups"></div>
</div>

<!-- السؤال -->
<div class="box">
<h3>السؤال</h3>
<input id="q"><br>

<input id="a1">
<input id="a2">
<input id="a3">
<input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>
<div id="answers"></div>
</div>

<button onclick="showWinner()">🏆 إعلان الفائز</button>
<div id="winner"></div>

<div style="position:fixed;bottom:20px;left:20px;font-size:50px;">🤖</div>

<audio id="clap" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>

let classes = JSON.parse(localStorage.getItem("classes")) || [];
let groups = JSON.parse(localStorage.getItem("groups")) || [];
let currentClass = localStorage.getItem("currentClass") || "";

/* حفظ */
function save(){
localStorage.setItem("classes",JSON.stringify(classes));
localStorage.setItem("groups",JSON.stringify(groups));
localStorage.setItem("currentClass",currentClass);
render();
}

/* عرض */
function render(){

classesDiv.innerHTML="";
classes.forEach((c,i)=>{
let d=document.createElement("div");
d.innerHTML=(c===currentClass?"👉 ":"")+c+" ❌";

d.onclick=()=>{currentClass=c;save();}
d.ondblclick=()=>{
classes.splice(i,1);
groups=groups.filter(g=>g.class!==c);
save();
};

classesDiv.appendChild(d);
});

groupsDiv.innerHTML="";
groups.filter(g=>g.class===currentClass).forEach((g,i)=>{

let d=document.createElement("div");
d.innerHTML=g.name+" ⭐ "+g.score+" ❌";

d.onclick=()=>{
groups.splice(groups.indexOf(g),1);
save();
};

d.ondblclick=()=>{
g.score++;
save();
};

groupsDiv.appendChild(d);
});
}

/* إضافة */
function addClass(){
let v=classInput.value;
if(!v)return;
classes.push(v);
if(!currentClass)currentClass=v;
save();
}

function addGroup(){
if(!currentClass){alert("اختاري فصل");return;}
let v=groupInput.value;
if(!v)return;
groups.push({name:v,score:0,class:currentClass});
save();
}

/* سؤال */
function showQ(){
answers.innerHTML="";
let correctIndex=correct.value;

[a1.value,a2.value,a3.value,a4.value].forEach((a,i)=>{
let b=document.createElement("button");
b.innerText=a;

b.onclick=()=>{
if(i==correctIndex){
b.style.background="green";
}else{
b.style.background="red";
}
};

answers.appendChild(b);
});
}

/* فائز */
function showWinner(){
let gs=groups.filter(g=>g.class===currentClass);
if(gs.length===0)return;

let win=gs.reduce((a,b)=>a.score>b.score?a:b);

winner.innerHTML="🏆 "+win.name;

/* صوت */
clap.play();

/* قصاصات */
for(let i=0;i<30;i++){
let c=document.createElement("div");
c.style.position="fixed";
c.style.width="8px";
c.style.height="8px";
c.style.background="hsl("+Math.random()*360+",100%,50%)";
c.style.left=Math.random()*100+"%";
c.style.top="-10px";
c.style.animation="fall 3s linear";
document.body.appendChild(c);
}
}

/* صوت */
function startSound(){
let msg=new SpeechSynthesisUtterance("مرحباً بكم في المنصة");
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

render();

</script>

</body>
</html>
