 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
margin:0;
color:white;
text-align:center;
overflow:hidden;
}

/* فيديو */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* صندوق */
.box{
background:#0f172acc;
margin:20px;
padding:20px;
border-radius:20px;
}

/* أزرار */
button{
background:#22d3ee;
border:none;
padding:10px 20px;
border-radius:10px;
margin:5px;
cursor:pointer;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

/* الدوائر */
.circle{
width:110px;
height:110px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
background:red;
cursor:pointer;
font-size:18px;
}

.correct{background:green;}
.wrong{background:red;}

/* روبوت */
#robot{
position:fixed;
bottom:20px;
left:20px;
font-size:40px;
animation:float 2s infinite alternate;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-15px)}
}

/* احتفال */
#celebration{
display:none;
position:fixed;
top:30%;
left:0;
right:0;
font-size:30px;
background:#000000aa;
padding:20px;
border-radius:20px;
}
</style>
</head>

<body>

<!-- فيديو -->
<video id="bg" autoplay muted loop playsinline>
<source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<h1>🤖 منصة بصمة الذكاء</h1>

<!-- اختيار فيديو -->
<label style="background:#22d3ee;padding:10px;border-radius:10px;cursor:pointer;">
🎬 اختيار فيديو
<input type="file" accept="video/*" onchange="setVideo(event)" hidden>
</label>

<button onclick="speak('أهلاً بكم')">🔊 تشغيل الصوت</button>

<!-- البيانات -->
<div class="box">
<h2>البيانات</h2>
<input placeholder="اسم المعلمة">
<input placeholder="اسم المدرسة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<!-- الفصل -->
<div class="box">
<h2>الفصل</h2>
<input id="className" placeholder="اسم الفصل">
<button onclick="setClass()">اختيار</button>
</div>

<!-- المجموعات -->
<div class="box">
<h2>المجموعات</h2>

<input id="groupName" placeholder="اسم المجموعة">
<button onclick="addGroup()">إضافة</button>

<br><br>

<select id="activeGroup">
<option>اختر المجموعة</option>
</select>

<div id="groups"></div>
</div>

<!-- السؤال -->
<div class="box">
<h2>🎮 السؤال</h2>

<input id="question" placeholder="السؤال"><br>

<input id="a1" placeholder="1">
<input id="a2" placeholder="2"><br>
<input id="a3" placeholder="3">
<input id="a4" placeholder="4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<br>
<button onclick="showQ()">عرض السؤال</button>

<div id="qBox"></div>
</div>

<button onclick="winner()">🏆 إعلان الفائز</button>
<h2 id="result"></h2>

<!-- احتفال -->
<div id="celebration">
🏆🎉🎉🎉  
<h2 id="winnerName"></h2>
🎉🎉🎉
</div>

<!-- روبوت -->
<div id="robot">🤖✨</div>

<script>

let data = JSON.parse(localStorage.getItem("AI")) || {};
let currentClass = "";

/* حفظ */
function save(){
localStorage.setItem("AI", JSON.stringify(data));
}

/* فيديو */
function setVideo(e){
let file = e.target.files[0];
if(file){
bg.src = URL.createObjectURL(file);
}
}

/* صوت */
function speak(text){
let msg = new SpeechSynthesisUtterance(text);
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

/* فصل */
function setClass(){
currentClass = className.value;

if(!data[currentClass]){
data[currentClass] = {};
}

save();
show();
speak("تم اختيار الفصل");
}

/* إضافة مجموعة */
function addGroup(){
let g = groupName.value;

for(let c in data){
data[c][g] = data[c][g] || 0;
}

if(!data[currentClass]){
data[currentClass] = {};
data[currentClass][g] = 0;
}

save();
show();
speak("تمت إضافة مجموعة");
}

/* عرض */
function show(){
groups.innerHTML="";
activeGroup.innerHTML="<option>اختر المجموعة</option>";

for(let g in data[currentClass]){
groups.innerHTML += `
<div class="box">
${g} ⭐ ${data[currentClass][g]}
<button onclick="addPoint('${g}')">+1</button>
</div>
`;

activeGroup.innerHTML += `<option value="${g}">${g}</option>`;
}
}

/* نقطة */
function addPoint(g){
data[currentClass][g]++;
save();
show();

new Audio("https://www.soundjay.com/buttons/button-3.mp3").play();
speak("أحسنت");
}

/* عرض سؤال */
function showQ(){
let q = question.value;
let arr = [a1.value,a2.value,a3.value,a4.value];
let c = correct.value;

qBox.innerHTML = `<h3>${q}</h3>`;

arr.forEach((ans,i)=>{
qBox.innerHTML += `
<div class="circle" onclick="check(${i},${c})">${ans}</div>
`;
});
}

/* تحقق */
function check(i,c){
let circles = document.querySelectorAll(".circle");

circles.forEach(el=>el.classList.remove("correct","wrong"));

if(i == c){

circles[i].classList.add("correct");

let g = activeGroup.value;

if(!g || g === "اختر المجموعة"){
alert("اختاري مجموعة أول");
return;
}

data[currentClass][g]++;
save();
show();

new Audio("https://www.soundjay.com/buttons/button-3.mp3").play();
speak("إجابة صحيحة");

}else{
circles[i].classList.add("wrong");
}
}

/* فائز */
function winner(){
let max=-1, win="";

for(let g in data[currentClass]){
if(data[currentClass][g] > max){
max = data[currentClass][g];
win = g;
}
}

result.innerHTML="🏆 "+win;

celebration.style.display="block";
winnerName.innerText = win;

new Audio("https://www.soundjay.com/human/applause-8.mp3").play();
speak("الفائز هو " + win);
}

</script>

</body>
</html>
