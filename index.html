 html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بصمة الذكاء</title>

<style>
body{margin:0;font-family:tahoma;text-align:center;color:white}

/* فيديو كامل الشاشة */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.box{
background:rgba(0,0,0,0.6);
margin:10px;
padding:10px;
border-radius:10px;
}

button{
padding:8px;
margin:5px;
border:none;
border-radius:8px;
background:#00eaff;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
background:#777;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
}

.correct{background:green}
.wrong{background:red}
</style>
</head>

<body>

<video id="bg" autoplay muted loop playsinline>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h2>🤖 بصمة الذكاء</h2>

<button onclick="startSound()">🔊 تشغيل الصوت</button>

<div class="box">
<input type="file" accept="video/*" onchange="changeVideo(event)">
</div>

<!-- الفصول -->
<div class="box">
<input id="classInput" placeholder="فصل">
<button onclick="addClass()">إضافة</button>
<div id="classList"></div>
</div>

<!-- المجموعات -->
<div class="box">
<input id="groupInput" placeholder="مجموعة">
<button onclick="addGroup()">إضافة</button><br>

<select id="groupSelect"></select>
<div id="groups"></div>

<button onclick="addPoint()">➕ نقطة</button>
</div>

<!-- السؤال -->
<div class="box">
<input id="q" placeholder="السؤال"><br>

<input id="a1"><input id="a2"><br>
<input id="a3"><input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>

<div id="qBox"></div>
</div>

<script>
let data={};
let currentClass="";

/* صوت بدون تعليق */
function speak(text){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

/* زر تشغيل الصوت */
function startSound(){
speak("مرحباً بكم في منصة بصمة الذكاء");
}

/* فيديو كامل */
function changeVideo(e){
let file=e.target.files[0];
if(file){
bg.src=URL.createObjectURL(file);
}
}

/* فصول */
function addClass(){
let c=classInput.value;
if(!c)return;

data[c]={};
currentClass=c;

renderClasses();
renderGroups();
}

function renderClasses(){
classList.innerHTML="";
for(let c in data){
classList.innerHTML+=`
<div>
${c}
<button onclick="selectClass('${c}')">اختيار</button>
<button onclick="deleteClass('${c}')">❌</button>
</div>`;
}
}

function selectClass(c){
currentClass=c;
renderGroups();
}

function deleteClass(c){
delete data[c];
renderClasses();
renderGroups();
}

/* مجموعات */
function addGroup(){
let g=groupInput.value;

if(!currentClass)return alert("اختاري فصل");

data[currentClass][g]=0;
renderGroups();
}

function renderGroups(){
groups.innerHTML="";
groupSelect.innerHTML="";

for(let g in data[currentClass]||{}){
groups.innerHTML+=`
${g} ⭐ ${data[currentClass][g]}<br>`;
groupSelect.innerHTML+=`<option>${g}</option>`;
}
}

/* نقطة يدوي */
function addPoint(){
let g=groupSelect.value;
data[currentClass][g]++;
renderGroups();
speak("تمت إضافة نقطة");
}

/* عرض السؤال */
function showQ(){

let answers=[a1.value,a2.value,a3.value,a4.value];

qBox.innerHTML="<h3>"+q.value+"</h3>";

answers.forEach((a,i)=>{
qBox.innerHTML+=`
<div class="circle" data-i="${i}" onclick="checkAnswer(this)">
${a}
</div>`;
});
}

/* إصلاح نهائي للإجابة */
function checkAnswer(el){

let correctIndex=parseInt(correct.value);
let clicked=parseInt(el.dataset.i);

// تنظيف
document.querySelectorAll(".circle").forEach(c=>{
c.classList.remove("correct","wrong");
});

if(clicked===correctIndex){
el.classList.add("correct");
speak("إجابة صحيحة");
new Audio("https://www.soundjay.com/human/applause-8.mp3").play();
}else{
el.classList.add("wrong");
speak("إجابة خاطئة");
}
}
</script>

</body>
</html>
