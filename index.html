 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>

body{
font-family:Tahoma;
direction:rtl;
margin:0;
text-align:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
font-size:30px;
padding:20px;
text-shadow:0 0 15px #00e5ff;
}

.container{
background:rgba(0,0,0,.55);
width:90%;
max-width:900px;
margin:20px auto;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,255,255,.4);
}

input{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00e5ff;
color:black;
cursor:pointer;
margin:5px;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
}

.fingerprint{
font-size:70px;
cursor:pointer;
margin:20px;
transition:.3s;
}

.fingerprint:hover{
transform:scale(1.3);
}

.correct{
color:#00ff9d;
font-size:24px;
}

.wrong{
color:#ff5252;
font-size:24px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #00e5ff;
padding:8px;
}

</style>

</head>

<body>

<header>
🧠 عالم بصمة الذكاء
</header>

<audio autoplay>
<source src="https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3">
</audio>

<div class="container">

<h3>البيانات الأساسية</h3>

<input id="school" placeholder="اسم المدرسة">
<input id="principal" placeholder="اسم المديرة">
<input id="teacher" placeholder="اسم المعلمة">
<input id="lesson" placeholder="عنوان الدرس">

<button onclick="saveInfo()">حفظ البيانات</button>

</div>

<div class="container">

<h3>إدارة المجموعات</h3>

<input id="teamName" placeholder="اسم المجموعة">
<button onclick="addTeam()">إضافة مجموعة</button>

<table>

<tr>
<th>المجموعة</th>
<th>النقاط</th>
<th>حذف</th>
</tr>

<tbody id="teamsTable"></tbody>

</table>

</div>

<div class="container">

<h3>إضافة سؤال</h3>

<input id="questionInput" placeholder="اكتب السؤال">

<input id="correctAnswer" placeholder="الإجابة الصحيحة A B C D">

<button onclick="addQuestion()">إضافة السؤال</button>

</div>

<div class="container">

<h2 id="questionDisplay"></h2>

<div>

<span class="fingerprint" onclick="answer('A')">🔵</span>
<span class="fingerprint" onclick="answer('B')">🔴</span>
<span class="fingerprint" onclick="answer('C')">🟢</span>
<span class="fingerprint" onclick="answer('D')">🟡</span>

</div>

<p id="result"></p>

</div>

<script>

let questions = JSON.parse(localStorage.getItem("questions")) || [];
let teams = JSON.parse(localStorage.getItem("teams")) || [];
let currentQuestion = 0;

let correctSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3");
let wrongSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3");

function saveInfo(){

let info = {
school:school.value,
principal:principal.value,
teacher:teacher.value,
lesson:lesson.value
};

localStorage.setItem("info",JSON.stringify(info));

alert("تم حفظ البيانات");

}

function addQuestion(){

let q = questionInput.value;
let correct = correctAnswer.value;

questions.push({q,correct});

localStorage.setItem("questions",JSON.stringify(questions));

questionInput.value="";

showQuestion();

}

function showQuestion(){

if(questions.length>0){

document.getElementById("questionDisplay").innerText =
questions[currentQuestion].q;

}

}

function answer(choice){

let correct = questions[currentQuestion].correct;

if(choice == correct){

result.innerHTML="<span class='correct'>⭐ إجابة صحيحة</span>";
correctSound.play();

teams.forEach(t=>t.points++);

localStorage.setItem("teams",JSON.stringify(teams));

renderTeams();

}
else{

result.innerHTML="<span class='wrong'>💡 حاولي مرة أخرى</span>";
wrongSound.play();

}

}

function addTeam(){

let name = teamName.value;

teams.push({name,points:0});

localStorage.setItem("teams",JSON.stringify(teams));

teamName.value="";

renderTeams();

}

function deleteTeam(index){

teams.splice(index,1);

localStorage.setItem("teams",JSON.stringify(teams));

renderTeams();

}

function renderTeams(){

let table=document.getElementById("teamsTable");

table.innerHTML="";

teams.forEach((t,i)=>{

table.innerHTML += `
<tr>
<td>${t.name}</td>
<td>${t.points}</td>
<td><button onclick="deleteTeam(${i})">❌</button></td>
</tr>
`;

});

}

showQuestion();
renderTeams();

</script>

</body>
</html>
