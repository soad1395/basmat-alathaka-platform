 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🤖 بصمة الذكاء</title>

<style>
body{margin:0;font-family:tahoma;text-align:center;color:white}

#bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
z-index:-1;
}

.box{
background:rgba(0,0,0,0.7);
margin:10px;
padding:10px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#00eaff;
cursor:pointer;
}

input,select{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}

.circle{
width:90px;height:90px;
border-radius:50%;
background:#777;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
}

.correct{background:green}
.wrong{background:red}
</style>
</head>

<body onclick="startAI()">

<video id="bg" autoplay muted loop playsinline>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h2>🤖 منصة بصمة الذكاء</h2>

<!-- رفع فيديو -->
<div class="box">
<input type="file" accept="video/*" onchange="uploadVideo(event)">
</div>

<!-- البيانات -->
<div class="box">
<input id="teacher" placeholder="المعلمة">
<input id="school" placeholder="المدرسة">
<input id="subject" placeholder="المادة">
<input id="grade" placeholder="الصف">
<button onclick="saveInfo()">💾 حفظ</button>
</div>

<!-- الفصول -->
<div class="box">
<input id="classInput" placeholder="فصل">
<button onclick="addClass()">إضافة</button>
<div id="classList"></div>
</div>

<!-- المجموعات -->
<div class="box">
<input id="groupInput" placeholder="مجموعة">
<button onclick="addGroup()">إضافة</button>

<select id="groupSelect"></select>
<div id="groups"></div>

<button onclick="spin()">🎡 عجلة</button>
<h3 id="selected"></h3>

<button onclick="addPoint()">➕ نقطة</button>
</div>

<!-- السؤال -->
<div class="box">
<input id="q" placeholder="السؤال"><br>

<input id="a1"><input id="a2"><br>
<input id="a3"><input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>
<div id="qBox"></div>
</div>

<button onclick="winner()">🏆 الفائز</button>
<h2 id="win"></h2>

<script>

let data=JSON.parse(localStorage.getItem("data"))||{};
let currentClass="";
let started=false;

/* صوت */
function speak(t){
speechSynthesis.cancel();
let m=new SpeechSynthesisUtterance(t);
m.lang="ar-SA";
speechSynthesis.speak(m);
}

function startAI(){
if(!started){
speak("مرحباً بكم");
started=true;
}
}

/* فيديو */
function uploadVideo(e){
let file=e.target.files[0];
if(file){
bg.src=URL.createObjectURL(file);
}
}

/* بيانات */
function saveInfo(){
let info={
teacher:teacher.value,
school:school.value,
subject:subject.value,
grade:grade.value
};
localStorage.setItem("info",JSON.stringify(info));
speak("تم الحفظ");
}

window.onload=function(){
let info=JSON.parse(localStorage.getItem("info"));
if(info){
teacher.value=info.teacher||"";
school.value=info.school||"";
subject.value=info.subject||"";
grade.value=info.grade||"";
}
renderClasses();
}

/* فصول */
function addClass(){
let c=classInput.value;
if(!c)return;
data[c]={};
currentClass=c;
saveData();
renderClasses();
renderGroups();
}

function renderClasses(){
classList.innerHTML="";
for(let c in data){
classList.innerHTML+=`
<div>${c}
<button onclick="selectClass('${c}')">اختيار</button>
<button onclick="deleteClass('${c}')">❌</button>
</div>`;
}
}

function selectClass(c){
currentClass=c;
renderGroups();
}

function deleteClass(c){
delete data[c];
saveData();
renderClasses();
renderGroups();
}

/* مجموعات */
function addGroup(){
let g=groupInput.value;
if(!currentClass)return alert("اختاري فصل");
data[currentClass][g]=data[currentClass][g]||0;
saveData();
renderGroups();
}

function deleteGroup(g){
delete data[currentClass][g];
saveData();
renderGroups();
}

function renderGroups(){
groups.innerHTML="";
groupSelect.innerHTML="";
for(let g in data[currentClass]||{}){
groups.innerHTML+=`${g} ⭐ ${data[currentClass][g]} 
<button onclick="deleteGroup('${g}')">❌</button><br>`;
groupSelect.innerHTML+=`<option>${g}</option>`;
}
}

/* نقطة */
function addPoint(){
let g=groupSelect.value;
if(!g)return;
data[currentClass][g]++;
saveData();
renderGroups();
}

/* عجلة */
function spin(){
let arr=Object.keys(data[currentClass]||{});
if(arr.length===0)return;

let g=arr[Math.floor(Math.random()*arr.length)];
selected.innerText="🎯 "+g;
groupSelect.value=g;
speak("المجموعة "+g);
}

/* سؤال */
function showQ(){
let answers=[a1.value,a2.value,a3.value,a4.value];
qBox.innerHTML="<h3>"+q.value+"</h3>";

answers.forEach((a,i)=>{
qBox.innerHTML+=`
<div class="circle" data-i="${i}" onclick="check(this)">
${a}
</div>`;
});
}

/* إجابة */
function check(el){
let c=parseInt(correct.value);
let i=parseInt(el.dataset.i);
let g=groupSelect.value;

document.querySelectorAll(".circle").forEach(e=>{
e.classList.remove("correct","wrong");
});

if(i===c){
el.classList.add("correct");
if(g){data[currentClass][g]++;}
speak("إجابة صحيحة");
clap();confetti();
}else{
el.classList.add("wrong");
speak("خطأ");
}

saveData();
renderGroups();
}

/* فائز */
function winner(){
let max=-1,name="";
for(let g in data[currentClass]){
if(data[currentClass][g]>max){
max=data[currentClass][g];
name=g;
}
}
win.innerText="🏆 "+name;
clap();confetti();
speak("الفائز "+name);
}

/* مؤثرات */
function clap(){
new Audio("https://www.soundjay.com/human/applause-8.mp3").play();
}

function confetti(){
for(let i=0;i<30;i++){
let d=document.createElement("div");
d.style.position="fixed";
d.style.width="6px";
d.style.height="6px";
d.style.background="yellow";
d.style.top="0";
d.style.left=Math.random()*100+"%";
document.body.appendChild(d);
let fall=setInterval(()=>d.style.top=(d.offsetTop+5)+"px",20);
setTimeout(()=>{clearInterval(fall);d.remove()},2000);
}
}

function saveData(){
localStorage.setItem("data",JSON.stringify(data));
}

</script>

</body>
</html>
