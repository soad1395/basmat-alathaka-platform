<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
margin:0;
text-align:center;
color:white;
background:#020617;
}

.box{
background:#0f172a;
margin:20px;
padding:20px;
border-radius:20px;
}

button{
padding:8px 12px;
margin:5px;
background:#00eaff;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🤖 منصة بصمة الذكاء</h1>

<div class="box">
<input id="classInput" placeholder="اسم الفصل">
<button onclick="setClass()">اختيار الفصل</button>
</div>

<div class="box">
<input id="groupInput" placeholder="اسم المجموعة">
<button onclick="addGroup()">إضافة مجموعة</button>
<div id="groups"></div>
</div>

<button onclick="showWinner()">🏆 إعلان الفائز</button>

<h2 id="result"></h2>

<script>

let DB = JSON.parse(localStorage.getItem("DB") || "{}");
let currentClass = localStorage.getItem("CLASS") || "";

function save(){
localStorage.setItem("DB", JSON.stringify(DB));
localStorage.setItem("CLASS", currentClass);
}

function setClass(){
currentClass = classInput.value;

if(!DB[currentClass]){
DB[currentClass] = [];
}

save();
render();
}

function addGroup(){
let name = groupInput.value;
if(!name) return;

Object.keys(DB).forEach(cls=>{
DB[cls].push({name:name,score:0});
});

if(!DB[currentClass]){
DB[currentClass]=[];
}

DB[currentClass].push({name:name,score:0});

save();
render();
}

function addPoint(i){
DB[currentClass][i].score++;
save();
render();
}

function removeGroup(i){
Object.keys(DB).forEach(cls=>{
DB[cls].splice(i,1);
});
save();
render();
}

function render(){
groups.innerHTML="";

if(!DB[currentClass]) return;

DB[currentClass].forEach((g,i)=>{
groups.innerHTML+=`
<div>
<button onclick="addPoint(${i})">1+</button>
⭐ ${g.score} ${g.name}
<button onclick="removeGroup(${i})">❌</button>
</div>
`;
});
}

function showWinner(){
let list = DB[currentClass];
if(!list) return;

let max = Math.max(...list.map(g=>g.score));
let win = list.filter(g=>g.score==max);

let names = win.map(w=>w.name).join(" و ");

result.innerHTML="🏆 "+names;
}

render();

</script>

</body>
</html>
