 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بصمة الذكاء</title>
<style>
body{margin:0;font-family:tahoma;text-align:center;color:#fff}
#bg{position:fixed;width:100%;height:100%;object-fit:cover;z-index:-1}
.box{background:rgba(0,0,0,.6);margin:10px;padding:10px;border-radius:10px}
button{padding:8px;margin:5px;border-radius:8px;border:none;background:#00eaff}
.circle{width:100px;height:100px;border-radius:50%;background:#777;
display:inline-flex;align-items:center;justify-content:center;margin:10px;cursor:pointer}
.correct{background:green}
.wrong{background:red}
</style>
</head>

<body onload="start()">

<video id="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h2>🤖 بصمة الذكاء</h2>

<div class="box">
<input type="file" onchange="bg.src=URL.createObjectURL(event.target.files[0])">
</div>

<div class="box">
<input id="classInput" placeholder="فصل">
<button onclick="addClass()">إضافة فصل</button>
<div id="classList"></div>
</div>

<div class="box">
<input id="groupInput" placeholder="مجموعة">
<button onclick="addGroup()">إضافة مجموعة</button><br>
<select id="groupSelect"></select>
<div id="groups"></div>

<button onclick="spin()">🎡 اختيار مجموعة</button>
<h3 id="selected"></h3>

<button onclick="addPoint()">➕ نقطة</button>
</div>

<div class="box">
<input id="q" placeholder="السؤال"><br>
<input id="a1"><input id="a2"><br>
<input id="a3"><input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>
<div id="qBox"></div>
</div>

<button onclick="winner()">🏆 الفائز</button>
<h2 id="win"></h2>

<script>
let data=JSON.parse(localStorage.getItem("AI"))||{};
let currentClass="";

/* صوت */
function speak(t){
let m=new SpeechSynthesisUtterance(t);
m.lang="ar-SA";
speechSynthesis.speak(m);
}

/* أول دخول */
function start(){
document.body.onclick=()=>{
speak("مرحباً بكم في منصة بصمة الذكاء");
};
renderClasses();
}

/* فصول */
function addClass(){
let c=classInput.value;
if(!c)return;
data[c]={};
currentClass=c;
save();renderClasses();renderGroups();
}

function renderClasses(){
classList.innerHTML="";
for(let c in data){
classList.innerHTML+=`<div>${c}
<button onclick="currentClass='${c}';renderGroups()">اختيار</button>
<button onclick="delete data['${c}'];save();renderClasses()">❌</button>
</div>`;
}
}

/* مجموعات */
function addGroup(){
let g=groupInput.value;
if(!currentClass)return alert("اختاري فصل");
data[currentClass][g]=data[currentClass][g]||0;
save();renderGroups();
}

function renderGroups(){
groups.innerHTML="";groupSelect.innerHTML="";
for(let g in data[currentClass]){
groups.innerHTML+=`${g} ⭐ ${data[currentClass][g]}<br>`;
groupSelect.innerHTML+=`<option>${g}</option>`;
}
}

/* نقطة يدوي */
function addPoint(){
let g=groupSelect.value;
data[currentClass][g]++;
save();renderGroups();
speak("تمت إضافة نقطة");
}

/* عجلة */
function spin(){
let arr=Object.keys(data[currentClass]);
let g=arr[Math.floor(Math.random()*arr.length)];
selected.innerText=g;
groupSelect.value=g;
}

/* سؤال */
function showQ(){
let answers=[a1.value,a2.value,a3.value,a4.value];
qBox.innerHTML="<h3>"+q.value+"</h3>";

answers.forEach((a,i)=>{
qBox.innerHTML+=`<div class="circle" data-i="${i}" onclick="check(this)">${a}</div>`;
});
}

/* الإجابة الصحيحة */
function check(el){
let c=parseInt(correct.value);
let i=parseInt(el.dataset.i);

document.querySelectorAll(".circle").forEach(e=>{
e.classList.remove("correct","wrong");
});

if(i===c){
el.classList.add("correct");
speak("إجابة صحيحة");
new Audio("https://www.soundjay.com/human/applause-8.mp3").play();
confetti();
}else{
el.classList.add("wrong");
speak("خطأ");
}
}

/* فائز */
function winner(){
let max=-1,name="";
for(let g in data[currentClass]){
if(data[currentClass][g]>max){
max=data[currentClass][g];name=g;
}
}
win.innerText="🏆 "+name;
confetti();
}

/* قصاصات */
function confetti(){
for(let i=0;i<30;i++){
let d=document.createElement("div");
d.style.position="fixed";
d.style.width="6px";
d.style.height="6px";
d.style.background="yellow";
d.style.top="0";
d.style.left=Math.random()*100+"%";
document.body.appendChild(d);
let fall=setInterval(()=>d.style.top=(d.offsetTop+5)+"px",20);
setTimeout(()=>{clearInterval(fall);d.remove()},2000);
}
}

function save(){
localStorage.setItem("AI",JSON.stringify(data));
}
</script>

</body>
</html>
