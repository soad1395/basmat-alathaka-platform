 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🤖 بصمة الذكاء</title>

<style>
body{
margin:0;
font-family:tahoma;
color:white;
text-align:center;
overflow-y:auto;
background:black;
}

/* فيديو */
#bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* صندوق */
.box{
background:rgba(0,0,0,0.6);
margin:15px;
padding:15px;
border-radius:15px;
}

/* أزرار */
button{
padding:10px;
border:none;
border-radius:10px;
background:#00eaff;
margin:5px;
cursor:pointer;
}

/* دوائر */
.circle{
width:120px;
height:120px;
border-radius:50%;
background:red;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
}

.correct{background:green;}
.wrong{background:red;}

/* روبوت */
#robot{
position:fixed;
bottom:10px;
left:10px;
font-size:40px;
animation:move 2s infinite alternate;
}
@keyframes move{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

/* احتفال */
#win{
display:none;
font-size:30px;
}
</style>
</head>

<body onload="welcome()">

<video id="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h1>🤖 منصة بصمة الذكاء</h1>

<div id="robot">🤖✨</div>

<!-- تغيير فيديو -->
<div class="box">
<input type="file" accept="video/*" onchange="setVideo(event)">
</div>

<!-- البيانات -->
<div class="box">
<h2>البيانات</h2>
<input id="t" placeholder="المعلمة">
<input id="s" placeholder="المدرسة">
<input id="m" placeholder="المادة">
<input id="g" placeholder="الصف">
</div>

<!-- الفصول -->
<div class="box">
<h2>الفصول</h2>
<input id="className">
<button onclick="addClass()">إضافة</button>
<div id="classes"></div>
</div>

<!-- المجموعات -->
<div class="box">
<h2>المجموعات</h2>
<input id="groupName">
<button onclick="addGroup()">إضافة</button>
<select id="activeGroup"></select>
<div id="groups"></div>
</div>

<!-- السؤال -->
<div class="box">
<h2>السؤال</h2>
<input id="q"><br>
<input id="a1">
<input id="a2"><br>
<input id="a3">
<input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>

<div id="qBox"></div>
</div>

<button onclick="winner()">🏆 الفائز</button>

<div id="win"></div>

<script>
let data = JSON.parse(localStorage.getItem("AI")) || {};
let currentClass="";

/* صوت */
function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

/* ترحيب */
function welcome(){
speak("مرحباً بكم في عالم الذكاء");
}

/* فيديو */
function setVideo(e){
bg.src=URL.createObjectURL(e.target.files[0]);
}

/* فصول */
function addClass(){
let c=className.value;
if(!data[c]) data[c]={};
currentClass=c;
save(); show();
}

function showClasses(){
classes.innerHTML="";
for(let c in data){
classes.innerHTML+=`
<div>${c}
<button onclick="selectClass('${c}')">اختيار</button>
</div>`;
}
}

function selectClass(c){
currentClass=c;
show();
}

/* مجموعات */
function addGroup(){
let g=groupName.value;
for(let c in data){
data[c][g]=data[c][g]||0;
}
save(); show();
}

function show(){
groups.innerHTML="";
activeGroup.innerHTML="";
for(let g in data[currentClass]){
groups.innerHTML+=`${g} ⭐ ${data[currentClass][g]}
<button onclick="addPoint('${g}')">+1</button><br>`;
activeGroup.innerHTML+=`<option>${g}</option>`;
}
showClasses();
}

/* نقاط */
function addPoint(g){
data[currentClass][g]++;
save();
show();
speak("أحسنت");
}

/* سؤال */
function showQ(){
let arr=[a1.value,a2.value,a3.value,a4.value];
let c=correct.value;

qBox.innerHTML=q.value+"<br>";

arr.forEach((ans,i)=>{
qBox.innerHTML+=`
<div class="circle" onclick="check(${i},${c})">${ans}</div>`;
});

speak(q.value);
}

/* تحقق */
function check(i,c){
let circles=document.querySelectorAll(".circle");
if(i==c){
circles[i].classList.add("correct");
let g=activeGroup.value;
data[currentClass][g]++;
save(); show();
speak("صحيح");
}else{
circles[i].classList.add("wrong");
speak("خطأ");
}
}

/* فائز */
function winner(){
let max=-1,winName="";
for(let g in data[currentClass]){
if(data[currentClass][g]>max){
max=data[currentClass][g];
winName=g;
}
}
win.innerHTML="🏆 "+winName;
win.style.display="block";
speak("الفائز هو "+winName);
}

/* حفظ */
function save(){
localStorage.setItem("AI",JSON.stringify(data));
}

showClasses();
</script>

</body>
</html>
