<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
margin:0;
background:#020617;
color:white;
text-align:center;
}

/* خلفية */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00eaff33 2px,transparent 2px);
background-size:80px 80px;
animation:move 40s linear infinite;
z-index:-1;
}

@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(200px,200px)}
}

.box{
background:#0f172a;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px #00eaff55;
}

input,select{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#00eaff;
cursor:pointer;
}

.circle{
width:80px;
height:80px;
border-radius:50%;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
background:#1e293b;
cursor:pointer;
}

.correct{background:green;}
.wrong{background:red;}
</style>
</head>

<body>

<h1>🤖 منصة بصمة الذكاء</h1>

<div class="box">
<h2>البيانات الأساسية</h2>
<input placeholder="اسم المدرسة">
<input placeholder="اسم المعلمة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<div class="box">
<h2>الفصول</h2>
<input id="className">
<button onclick="addClass()">إضافة</button>
<div id="classes"></div>
</div>

<div class="box">
<h2>المجموعات</h2>
<input id="groupName">
<select id="groupClass"></select>
<button onclick="addGroup()">إضافة</button>
<div id="groups"></div>
</div>

<div class="box">
<h2>السؤال</h2>
<input id="q"><br>
<input id="a1">
<input id="a2">
<input id="a3">
<input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>

<div id="answers"></div>
</div>

<button onclick="winner()">🏆 إعلان الفائز</button>

<script>

/* عناصر */
let classesDiv=document.getElementById("classes");
let groupClass=document.getElementById("groupClass");
let groupsDiv=document.getElementById("groups");
let answersDiv=document.getElementById("answers");

let className=document.getElementById("className");
let groupName=document.getElementById("groupName");

let q=document.getElementById("q");
let a1=document.getElementById("a1");
let a2=document.getElementById("a2");
let a3=document.getElementById("a3");
let a4=document.getElementById("a4");
let correct=document.getElementById("correct");

/* بيانات */
let classes=[];
let groups=[];
let scores={};
let correctAnswer=0;

/* الفصول */
function addClass(){
if(!className.value) return;
classes.push(className.value);
updateClasses();
className.value="";
}

function updateClasses(){
classesDiv.innerHTML="";
groupClass.innerHTML="";
classes.forEach((c,i)=>{
classesDiv.innerHTML+=`<p>${c}</p>`;
groupClass.innerHTML+=`<option>${c}</option>`;
});
}

/* المجموعات */
function addGroup(){
if(!groupName.value) return;
groups.push({name:groupName.value,cls:groupClass.value});
scores[groupName.value]=0;
updateGroups();
groupName.value="";
}

function updateGroups(){
groupsDiv.innerHTML="";
groups.forEach(g=>{
groupsDiv.innerHTML+=`<p>${g.name} (${g.cls}) = ${scores[g.name]}</p>`;
});
}

/* السؤال */
function showQ(){
correctAnswer=parseInt(correct.value);

let arr=[a1.value,a2.value,a3.value,a4.value];

answersDiv.innerHTML="";

arr.forEach((a,i)=>{
answersDiv.innerHTML+=`<div class="circle" onclick="check(${i},this)">${a}</div>`;
});
}

/* تحقق */
function check(i,el){
document.querySelectorAll(".circle").forEach(c=>c.classList.remove("correct","wrong"));

if(i===correctAnswer){
el.classList.add("correct");
}else{
el.classList.add("wrong");
}
}

/* الفائز */
function winner(){
let max=0;
let win="";
for(let g in scores){
if(scores[g]>max){
max=scores[g];
win=g;
}
}
alert("🏆 الفريق الفائز: "+win);
}

</script>

</body>
</html>
