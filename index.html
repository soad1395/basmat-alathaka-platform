 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بصمة الذكاء</title>

<style>
body{
direction:rtl;
font-family:tahoma;
text-align:center;
background:#020617;
color:white;
overflow-x:hidden;
}

.box{
background:#0f172a;
margin:15px;
padding:15px;
border-radius:15px;
}

button{
padding:10px;
margin:5px;
background:#00eaff;
border:none;
border-radius:10px;
cursor:pointer;
}

/* روبوت */
#robot{
position:fixed;
bottom:20px;
left:20px;
font-size:60px;
}

/* قصاصات */
.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear;
}

@keyframes fall{
to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<h1>🤖 منصة بصمة الذكاء</h1>

<button onclick="startSound()">🔊 تشغيل الصوت</button>

<!-- الفصول -->
<div class="box">
<h3>الفصول</h3>
<input id="classInput">
<button onclick="addClass()">إضافة</button>
<div id="classes"></div>
</div>

<!-- المجموعات -->
<div class="box">
<h3>المجموعات</h3>
<input id="groupInput">
<button onclick="addGroup()">إضافة</button>
<div id="groups"></div>
</div>

<button onclick="showWinner()">🏆 إعلان الفائز</button>
<div id="winner"></div>

<div id="robot">🤖</div>

<!-- أصوات -->
<audio id="clapSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>

/* بيانات */
let classes = JSON.parse(localStorage.getItem("classes")) || [];
let groups = JSON.parse(localStorage.getItem("groups")) || [];
let currentClass = localStorage.getItem("currentClass") || "";

/* حفظ */
function save(){
localStorage.setItem("classes", JSON.stringify(classes));
localStorage.setItem("groups", JSON.stringify(groups));
localStorage.setItem("currentClass", currentClass);
render();
}

/* عرض */
function render(){

let cDiv = document.getElementById("classes");
cDiv.innerHTML="";
classes.forEach((c,i)=>{
let d=document.createElement("div");
d.innerHTML = (c===currentClass?"👉 ":"")+c+" ❌";

d.onclick=()=>{
currentClass=c;
save();
};

d.ondblclick=()=>{
classes.splice(i,1);
groups = groups.filter(g=>g.class!==c);
save();
};

cDiv.appendChild(d);
});

let gDiv = document.getElementById("groups");
gDiv.innerHTML="";

groups.filter(g=>g.class===currentClass).forEach((g,i)=>{

let d=document.createElement("div");
d.innerHTML = g.name+" ⭐ "+g.score+" ❌";

d.onclick=()=>{
groups.splice(groups.indexOf(g),1);
save();
};

d.ondblclick=()=>{
g.score++;
save();
};

gDiv.appendChild(d);
});
}

/* إضافة فصل */
function addClass(){
let v = classInput.value;
if(!v) return;
classes.push(v);
if(!currentClass) currentClass=v;
save();
}

/* إضافة مجموعة */
function addGroup(){
if(!currentClass){
alert("اختاري فصل أول");
return;
}
let v = groupInput.value;
if(!v) return;

groups.push({
name:v,
score:0,
class:currentClass
});
save();
}

/* صوت روبوت */
function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.lang="ar-SA";
speechSynthesis.speak(msg);
}

/* تشغيل صوت */
function startSound(){
speak("مرحباً بكم في منصة بصمة الذكاء");
}

/* الفائز */
function showWinner(){

let classGroups = groups.filter(g=>g.class===currentClass);

if(classGroups.length===0){
alert("لا يوجد مجموعات");
return;
}

let win = classGroups.reduce((a,b)=>a.score>b.score?a:b);

document.getElementById("winner").innerHTML =
"🏆 الفائز: "+win.name;

/* صوت */
document.getElementById("clapSound").play();
speak("الفريق الفائز هو "+win.name);

/* قصاصات */
for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background="hsl("+Math.random()*360+",100%,50%)";
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}

}

render();

</script>

</body>
</html>
