 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بصمة الذكاء</title>

<style>
body{margin:0;font-family:tahoma;text-align:center;color:white}

#bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
z-index:-1;
}

.box{
background:rgba(0,0,0,0.6);
margin:10px;padding:10px;
border-radius:10px;
}

button{
padding:8px;margin:5px;
border:none;border-radius:8px;
background:#00eaff;
}

.circle{
width:100px;height:100px;
border-radius:50%;
background:#777;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
cursor:pointer;
}

.correct{background:green}
.wrong{background:red}
</style>
</head>

<body>

<video id="bg" autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h2>🤖 بصمة الذكاء</h2>

<button onclick="speak('مرحباً بكم')">🔊 تشغيل الصوت</button>

<!-- البيانات -->
<div class="box">
<input placeholder="المعلمة">
<input placeholder="المدرسة">
<input placeholder="المادة">
<input placeholder="الصف">
</div>

<!-- الفصول -->
<div class="box">
<input id="classInput" placeholder="فصل">
<button onclick="addClass()">إضافة</button>
<div id="classList"></div>
</div>

<!-- المجموعات -->
<div class="box">
<input id="groupInput" placeholder="مجموعة">
<button onclick="addGroup()">إضافة</button>

<select id="groupSelect"></select>
<div id="groups"></div>

<button onclick="spin()">🎡 عجلة</button>
<h3 id="selected"></h3>

<button onclick="addPoint()">➕ نقطة</button>
</div>

<!-- السؤال -->
<div class="box">
<input id="q"><br>
<input id="a1"><input id="a2"><br>
<input id="a3"><input id="a4"><br>

<select id="correct">
<option value="0">1</option>
<option value="1">2</option>
<option value="2">3</option>
<option value="3">4</option>
</select>

<button onclick="showQ()">عرض</button>

<div id="qBox"></div>
</div>

<script>

let data={},currentClass="";

function speak(t){
speechSynthesis.cancel();
let m=new SpeechSynthesisUtterance(t);
m.lang="ar-SA";
speechSynthesis.speak(m);
}

/* فصول */
function addClass(){
let c=classInput.value;
if(!c)return;
data[c]={};
currentClass=c;
renderClasses();
renderGroups();
}

function renderClasses(){
classList.innerHTML="";
for(let c in data){
classList.innerHTML+=`${c}
<button onclick="selectClass('${c}')">اختيار</button><br>`;
}
}

function selectClass(c){
currentClass=c;
renderGroups();
}

/* مجموعات */
function addGroup(){
let g=groupInput.value;
if(!currentClass)return alert("اختاري فصل");
data[currentClass][g]=0;
renderGroups();
}

function renderGroups(){
groups.innerHTML="";
groupSelect.innerHTML="";
for(let g in data[currentClass]||{}){
groups.innerHTML+=`${g} ⭐ ${data[currentClass][g]}<br>`;
groupSelect.innerHTML+=`<option>${g}</option>`;
}
}

/* نقطة */
function addPoint(){
let g=groupSelect.value;
data[currentClass][g]++;
renderGroups();
}

/* عجلة */
function spin(){
let arr=Object.keys(data[currentClass]||{});
let g=arr[Math.floor(Math.random()*arr.length)];
selected.innerText=g;
groupSelect.value=g;
}

/* سؤال */
function showQ(){
let answers=[a1.value,a2.value,a3.value,a4.value];

qBox.innerHTML="<h3>"+q.value+"</h3>";

answers.forEach((a,i)=>{
qBox.innerHTML+=`<div class="circle" data-i="${i}" onclick="check(this)">${a}</div>`;
});
}

/* إصلاح الإجابة */
function check(el){
let c=parseInt(correct.value);
let i=parseInt(el.dataset.i);

document.querySelectorAll(".circle").forEach(e=>{
e.classList.remove("correct","wrong");
});

if(i===c){
el.classList.add("correct");
speak("صح");
}else{
el.classList.add("wrong");
speak("خطأ");
}
}

</script>

</body>
</html>
